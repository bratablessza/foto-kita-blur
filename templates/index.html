<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOTO KITA BLUR BY TAKTAK </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d0d0d;
            color: #fff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100vw;
            max-width: 800px;
            aspect-ratio: 4 / 3;
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }

        .container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .loading {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
            z-index: 10;
            transition: opacity 0.3s;
        }

        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #333;
            border-top-color: #00ff64;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .info {
            margin-top: 16px;
            text-align: center;
            color: #888;
            font-size: 14px;
            line-height: 1.6;
        }

        .info .gesture-icon {
            font-size: 32px;
            display: block;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loading" id="loading">
            <div class="spinner"></div>
        </div>
        <img src="/video_feed" alt="Camera feed" id="feed"
             onload="document.getElementById('loading').classList.add('hidden')"
             onerror="document.getElementById('loading').classList.remove('hidden')">
    </div>
    <div class="info">
        <span class="gesture-icon">✌️</span>
        Make a peace sign to blur the camera
        <br><br><br>
        <a href="https://github.com/bratablessza" target="_blank"> powered by taktak</a>
    </div>
</body>
</html>
